services:
  gateway_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway_agent
    user: "1001:1001"
    restart: unless-stopped
    command: python -m src.gateway.main
    ports:
      - "8000:8000"
    networks:
      inventory_bridge:
        ipv4_address: 172.30.0.10
    environment:
      - APP_ID=${APP_ID:-batch_count}
      - DEVICE_ID=${DEVICE_ID:-MAC-DEV-001}
      - CAMERA_URL=http://camera_agent:8002
      - INFERENCE_URL=http://inference_agent:8001
      - DISPLAY_URL=http://display_agent:8003
      - FIREBASE_SYNC_URL=http://firebase_sync_agent:8004
      - COUNTING_WINDOW_SEC=${COUNTING_WINDOW_SEC:-5}
      - BUNDLE_TIMEOUT_SEC=${BUNDLE_TIMEOUT_SEC:-10}
      - LOW_STOCK_THRESHOLD=${LOW_STOCK_THRESHOLD:-5}
      - HIGH_STOCK_THRESHOLD=${HIGH_STOCK_THRESHOLD:-50}
      - LOCATION_NAME=${LOCATION_NAME:-Mac Simulation}
    volumes:
      - ./src:/app/src:ro
    depends_on:
      camera_agent:
        condition: service_healthy
      inference_agent:
        condition: service_healthy
    mem_limit: "512m"
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  inference_agent:
    build:
      context: .
      dockerfile: Dockerfile.inference
    container_name: inference_agent
    user: "1001:1001"
    restart: unless-stopped
    command: python -m src.inference.main
    expose:
      - "8001"
    networks:
      inventory_bridge:
        ipv4_address: 172.30.0.11
    environment:
      - HEF_PATH=
      - MOCK_LABELS=${MOCK_LABELS:-bolt_m6,washer_m6,nut_m6}
      - MOCK_MIN_COUNT=${MOCK_MIN_COUNT:-1}
      - MOCK_MAX_COUNT=${MOCK_MAX_COUNT:-5}
    volumes:
      - ./src:/app/src:ro
    mem_limit: "2g"
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  camera_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera_agent
    user: "1001:1001"
    restart: unless-stopped
    command: python -m src.camera.main
    expose:
      - "8002"
    networks:
      inventory_bridge:
        ipv4_address: 172.30.0.12
    environment:
      - SIMULATE_CAMERA=true
    volumes:
      - ./src:/app/src:ro
    mem_limit: "512m"
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/frame", "-o", "/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  display_agent:
    build:
      context: .
      dockerfile: Dockerfile.display
    container_name: display_agent
    user: "1001:1001"
    restart: unless-stopped
    command: python -m src.display.main
    expose:
      - "8003"
    networks:
      inventory_bridge:
        ipv4_address: 172.30.0.13
    environment:
      - APP_ID=${APP_ID:-batch_count}
      - DISPLAY_HEADLESS=true
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
    volumes:
      - ./src:/app/src:ro
    mem_limit: "512m"
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  firebase_sync_agent:
    build:
      context: .
      dockerfile: Dockerfile.firebase_sync
    container_name: firebase_sync_agent
    user: "1001:1001"
    restart: unless-stopped
    command: python -m src.firebase_sync.main
    expose:
      - "8004"
    networks:
      inventory_bridge:
        ipv4_address: 172.30.0.14
    environment:
      - APP_ID=${APP_ID:-batch_count}
      - DEVICE_ID=${DEVICE_ID:-MAC-DEV-001}
      - FIREBASE_SIMULATE=true
      - EVENTS_LOG_PATH=/app/data/events.jsonl
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data:rw
    mem_limit: "256m"
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  inventory_bridge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
