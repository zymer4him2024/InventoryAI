name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      APP_ID: batch_count
      SIMULATE_CAMERA: "true"
      DISPLAY_HEADLESS: "true"
      FIREBASE_SIMULATE: "true"
      EVENTS_LOG_PATH: /tmp/inventoryai_events.jsonl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=results.xml || true
          python -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('results.xml').getroot()
          suite = root if 'failures' in root.attrib else root.find('testsuite')
          failures = int(suite.attrib.get('failures', 0))
          errors = int(suite.attrib.get('errors', 0))
          total = suite.attrib.get('tests', '?')
          if failures or errors:
              raise SystemExit(f'{failures} failures, {errors} errors')
          print(f'All {total} tests passed')
          "
